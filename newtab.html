<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Startbildschirm</title>
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <div id="pageBackdrop" class="page-backdrop"></div>
  <video id="bgVideo" class="bg-video" autoplay muted loop playsinline hidden></video>

  <main class="dashboard-shell" id="shell">
    <header class="topbar card-glass">
      <div class="topbar-left">
        <nav id="chipNav" class="chip-nav" aria-label="Pages"></nav>
        <button id="addPageButton" class="chip chip-add" type="button" title="Neue Page">+</button>
      </div>

      <form id="searchForm" class="search-wrap" role="search">
        <span class="search-icon" aria-hidden="true">&#128269;</span>
        <input id="searchInput" class="search-input" type="search" placeholder="Web suchen oder URL eingeben" autocomplete="off">
      </form>

      <div class="topbar-right">
        <div class="mini-stats">
          <article class="mini-stat">
            <span class="mini-label">Temperatur</span>
            <strong id="tempValue">--</strong>
          </article>
          <article class="mini-stat">
            <span class="mini-label">Fokus heute</span>
            <strong id="focusValue">00m</strong>
          </article>
          <article class="mini-stat" id="clockStat">
            <span class="mini-label">Uhr</span>
            <strong id="clockHeader">--:--</strong>
          </article>
        </div>
        <button id="themeToggle" class="chip" type="button">Darkmode</button>
        <button id="uploadBackgroundButton" class="chip" type="button">Wallpaper</button>
        <button id="clearBackgroundButton" class="chip" type="button">Clear</button>
        <input id="backgroundUploadInput" type="file" accept="image/png,image/jpeg,image/jpg,video/mp4" hidden>
      </div>
    </header>

    <section class="title-row">
      <p class="hero-label">Dashboard</p>
      <h1 id="heroTitle">Willkommen</h1>
      <p id="heroSubtitle">Mach diese Seite zu deiner eigenen.</p>
    </section>

    <section class="content-grid">
      <div id="tileBoard" class="tile-board" aria-label="Kachelbereich"></div>

      <aside class="utility-column">
        <section class="widget card-glass" id="calendarWidget">
          <h2 id="calendarTitle">Monat Jahr</h2>
          <div id="calendarWeekdays" class="calendar-weekdays"></div>
          <div id="calendarGrid" class="calendar-grid"></div>
        </section>

        <section class="widget card-glass" id="pomodoroWidget">
          <h2>Pomodoro</h2>
          <div class="pomodoro-modes">
            <button type="button" class="mode-chip mode-active" data-mode="focus">Fokus</button>
            <button type="button" class="mode-chip" data-mode="short">Kurze Pause</button>
            <button type="button" class="mode-chip" data-mode="long">Lange Pause</button>
          </div>
          <p id="pomodoroTimer" class="pomodoro-time">25:00</p>
          <div class="pomodoro-actions">
            <button id="pomodoroStart" type="button" class="pomodoro-button">Start</button>
            <button id="pomodoroReset" type="button" class="pomodoro-button ghost">Reset</button>
          </div>
        </section>

      </aside>
    </section>

    <p id="emptyState" class="empty-state" hidden>Keine Kacheln vorhanden. Klicke auf freie Flaeche, um eine neue Kachel anzulegen.</p>
  </main>

  <a class="settings-fab" href="options.html" target="_blank" rel="noopener noreferrer" aria-label="Einstellungen oeffnen" title="Einstellungen">&#9881;</a>

  <div id="contextMenu" class="context-menu" hidden></div>

  <div id="quickCreate" class="quick-create card-glass" hidden>
    <h3>Neue Kachel</h3>
    <label>
      Name
      <input id="quickTileName" type="text" maxlength="32" placeholder="Kachelname">
    </label>
    <label>
      Erster Linkname (optional)
      <input id="quickLinkLabel" type="text" maxlength="40" placeholder="z. B. Gmail">
    </label>
    <label>
      Erste URL (optional)
      <input id="quickLinkUrl" type="url" placeholder="https://example.com">
    </label>
    <div class="quick-create-actions">
      <button id="quickCreateSave" class="chip" type="button">Erstellen</button>
      <button id="quickCreateCancel" class="chip" type="button">Abbrechen</button>
    </div>
  </div>

  <div id="miniDialog" class="mini-dialog card-glass" hidden>
    <h3 id="miniDialogTitle">Bearbeiten</h3>
    <div id="miniDialogFields" class="mini-dialog-fields"></div>
    <div class="mini-dialog-actions">
      <button id="miniDialogSave" class="chip" type="button">Speichern</button>
      <button id="miniDialogCancel" class="chip" type="button">Abbrechen</button>
    </div>
  </div>

  <script src="newtab.js"></script>
</body>
</html>
